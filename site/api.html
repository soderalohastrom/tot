<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>tot API</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<style>
			body {
				margin: 0;
			}
		</style>
	</head>
	<body>
		<div id="redoc"></div>
		<script src="https://cdn.redocly.com/redoc/v2.5.3/bundles/redoc.standalone.js"></script>
		<script>
			const spec = {
				openapi: "3.1.0",
				info: {
					title: "tot API",
					version: "1.0.0",
					description:
						"The Workspaces HTTP API used by [tot.page](https://tot.page). The `tot` CLI is a thin wrapper over these endpoints — anything it does, you (or an agent) can do directly with `curl`.\n\n**Deployment status.** `https://workspaces.plannotator.ai` is the canonical Workspaces API origin for public release. Staging uses `https://staging.workspaces.plannotator.ai`. `api.tot.page` is only a temporary compatibility alias for already-published tot clients; new docs and packages must not advertise it. Workspaces production is not launched yet. The deployed `/v1/openapi.yaml` serves the live API profile, which excludes planned version-history list/restore routes until those product endpoints are implemented.\n\n**Two ways in:** publish **anonymously** (the page is `open` — the link is the key, anyone with it can read, update, or delete it), or send a Bearer API key (`wsk_live_…`) to own your pages.\n\n**Publish shape.** Markdown and bare HTML use one call: `POST /v1/documents`. HTML with direct local support files uses the workspace-first flow: create an empty workspace, upload assets, then commit the HTML last.\n\n**Living vs frozen.** Every publish/update mints a version (a content hash). The page's `share_url` is *living* — it always shows the latest. Each version also has a frozen `…@hash` URL that never changes.\n\nBase URL: `https://workspaces.plannotator.ai`",
				},
				servers: [
					{
						url: "https://workspaces.plannotator.ai",
						description: "Canonical Workspaces API origin",
					},
				],
				tags: [
					{ name: "Publish", description: "Create and change pages." },
					{
						name: "Assets",
						description: "Upload local support files before HTML goes live.",
					},
					{ name: "Read", description: "Fetch a page." },
					{ name: "Account", description: "Identify an API key." },
				],
				paths: {
					"/v1/documents": {
						post: {
							tags: ["Publish"],
							operationId: "publish",
							summary: "Publish a page",
							description:
								"Create a new markdown page, or a bare HTML page with no local support files, in one step. Anonymous → the page is `open` (the link is the key). Send a Bearer key → the page is `private` and owned by you.\n\nFor HTML that references local images/CSS/JS/video, use the workspace-first flow: `POST /v1/workspaces`, `PUT …/assets/{path}`, then `POST …/documents` last.\n\n`version` is `null` until the first checkpoint lands (~2–10s); poll `GET` the document until it is non-null, then the page is live.",
							security: [{}, { apiKey: [] }],
							requestBody: {
								required: true,
								content: {
									"application/json": {
										schema: { $ref: "#/components/schemas/PublishRequest" },
										examples: {
											markdown: {
												summary: "A markdown page",
												value: {
													kind: "markdown",
													body: "# Hello\n\nPublished with **tot**.",
												},
											},
											html: {
												summary: "A raw HTML page",
												value: {
													kind: "html",
													body: "<!doctype html><h1>Hi</h1>",
												},
											},
										},
									},
								},
							},
							responses: {
								201: {
									description: "Created.",
									content: {
										"application/json": {
											schema: {
												$ref: "#/components/schemas/PublishResponse",
											},
										},
									},
								},
								422: {
									description: "Validation error (e.g. body over 1.5 MB).",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Error" },
										},
									},
								},
								429: {
									description: "Rate limited.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Error" },
										},
									},
								},
							},
							"x-codeSamples": [
								{
									lang: "curl",
									source: 'curl -X POST https://workspaces.plannotator.ai/v1/documents \\\n  -H \'content-type: application/json\' \\\n  -d \'{"kind":"markdown","body":"# Hello"}\'',
								},
							],
						},
					},
					"/v1/workspaces": {
						post: {
							tags: ["Publish"],
							operationId: "createWorkspace",
							summary: "Create an empty workspace",
							description:
								"Step 1 for HTML with local support files. Creates an empty workspace shell. Nothing is publicly readable until you add the HTML document in the last step.",
							security: [{}, { apiKey: [] }],
							requestBody: {
								required: false,
								content: {
									"application/json": {
										schema: { type: "object", additionalProperties: false },
										example: {},
									},
								},
							},
							responses: {
								201: {
									description: "Created.",
									content: {
										"application/json": {
											schema: {
												$ref: "#/components/schemas/CreateWorkspaceResponse",
											},
										},
									},
								},
								422: {
									description: "Validation error.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Error" },
										},
									},
								},
								429: {
									description: "Rate limited.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Error" },
										},
									},
								},
							},
							"x-codeSamples": [
								{
									lang: "curl",
									source: "curl -X POST https://workspaces.plannotator.ai/v1/workspaces \\\n  -H 'content-type: application/json' \\\n  -d '{}'",
								},
							],
						},
					},
					"/v1/workspaces/{wsId}/assets/{assetPath}": {
						parameters: [
							{
								name: "wsId",
								in: "path",
								required: true,
								schema: { type: "string" },
								description: "Workspace id.",
							},
							{
								name: "assetPath",
								in: "path",
								required: true,
								schema: { type: "string" },
								description: "Path inside the workspace, e.g. `assets/logo.webp`.",
							},
						],
						put: {
							tags: ["Assets"],
							operationId: "uploadAsset",
							summary: "Upload a support file",
							description:
								"Step 2 for HTML with local support files. Upload every direct local browser dependency before committing the HTML. Accepted V1 types: images/SVG, CSS, JS, and MP4. Asset writes go directly to R2 + D1 metadata; they do not enter git and do not pass through the Workspace coordinator.",
							security: [{}, { apiKey: [] }],
							requestBody: {
								required: true,
								content: {
									"image/png": { schema: { type: "string", format: "binary" } },
									"image/jpeg": { schema: { type: "string", format: "binary" } },
									"image/gif": { schema: { type: "string", format: "binary" } },
									"image/webp": { schema: { type: "string", format: "binary" } },
									"image/svg+xml": {
										schema: { type: "string", format: "binary" },
									},
									"text/css": { schema: { type: "string", format: "binary" } },
									"application/javascript": {
										schema: { type: "string", format: "binary" },
									},
									"video/mp4": { schema: { type: "string", format: "binary" } },
								},
							},
							responses: {
								200: {
									description: "Uploaded.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Asset" },
										},
									},
								},
								409: { description: "Path conflict." },
								422: {
									description:
										"Validation error, unsupported content type, or over 10 MB.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Error" },
										},
									},
								},
							},
							"x-codeSamples": [
								{
									lang: "curl",
									source: "curl -X PUT https://workspaces.plannotator.ai/v1/workspaces/$WS/assets/assets/logo.webp \\\n  -H 'content-type: image/webp' \\\n  --data-binary @assets/logo.webp",
								},
							],
						},
					},
					"/v1/workspaces/{wsId}/documents": {
						parameters: [
							{
								name: "wsId",
								in: "path",
								required: true,
								schema: { type: "string" },
								description: "Workspace id.",
							},
						],
						post: {
							tags: ["Publish"],
							operationId: "addDocument",
							summary: "Commit HTML after assets",
							description:
								"Step 3 for HTML with local support files. Commit the HTML body last, after every asset upload succeeds. This is the step that makes the page publicly readable.",
							security: [{}, { apiKey: [] }],
							requestBody: {
								required: true,
								content: {
									"application/json": {
										schema: { $ref: "#/components/schemas/AddDocumentRequest" },
										example: {
											doc_path: "index.html",
											kind: "html",
											body: '<!doctype html><link rel="stylesheet" href="style.css"><h1>Hello</h1>',
										},
									},
								},
							},
							responses: {
								201: {
									description: "Created.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Document" },
										},
									},
								},
								409: { description: "Path conflict." },
								422: {
									description: "Validation error.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Error" },
										},
									},
								},
							},
						},
					},
					"/v1/workspaces/{wsId}/documents/{docId}": {
						parameters: [
							{
								name: "wsId",
								in: "path",
								required: true,
								schema: { type: "string" },
								description: "Workspace id (from the publish response).",
							},
							{
								name: "docId",
								in: "path",
								required: true,
								schema: { type: "string" },
								description: "Document id (from the publish response).",
							},
						],
						get: {
							tags: ["Read"],
							operationId: "read",
							summary: "Read a page",
							description:
								"Content-negotiated. `Accept: application/json` (default) returns the document; `Accept: text/markdown` returns the raw body. Reads are read-your-writes.",
							security: [{}, { apiKey: [] }],
							responses: {
								200: {
									description: "OK.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Document" },
										},
										"text/markdown": { schema: { type: "string" } },
									},
								},
								404: { description: "Not found / not visible." },
							},
							"x-codeSamples": [
								{
									lang: "curl",
									source: "curl https://workspaces.plannotator.ai/v1/workspaces/$WS/documents/$DOC",
								},
							],
						},
						put: {
							tags: ["Publish"],
							operationId: "update",
							summary: "Update a page",
							description:
								"Replace the page body with a **raw** request body (not JSON). For HTML with local support files, re-scan and upload new/changed assets first, then call this endpoint last. The `share_url` immediately reflects the new version. Pass `If-Match: <version>` to fail (412) if the page changed under you.",
							security: [{}, { apiKey: [] }],
							parameters: [
								{
									name: "If-Match",
									in: "header",
									required: false,
									schema: { type: "string" },
									description:
										"The last version you saw. Optional optimistic-concurrency guard.",
								},
							],
							requestBody: {
								required: true,
								content: {
									"text/markdown": {
										schema: { type: "string" },
										example: "# Updated\n\nNew content.",
									},
									"text/html": {
										schema: { type: "string" },
										example: "<!doctype html><h1>Updated</h1>",
									},
								},
							},
							responses: {
								200: {
									description: "Updated.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Document" },
										},
									},
								},
								412: {
									description:
										"Version conflict (If-Match did not match current).",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Error" },
										},
									},
								},
								422: { description: "Validation error." },
							},
							"x-codeSamples": [
								{
									lang: "curl",
									source: "curl -X PUT https://workspaces.plannotator.ai/v1/workspaces/$WS/documents/$DOC \\\n  -H 'content-type: text/markdown' \\\n  --data '# Updated'",
								},
							],
						},
						delete: {
							tags: ["Publish"],
							operationId: "remove",
							summary: "Remove a page",
							description:
								"Hard delete — permanent, no undo. On an `open` page, anyone with the link may delete it.",
							security: [{}, { apiKey: [] }],
							responses: {
								204: { description: "Deleted (or already gone)." },
								404: { description: "Not found." },
							},
							"x-codeSamples": [
								{
									lang: "curl",
									source: "curl -X DELETE https://workspaces.plannotator.ai/v1/workspaces/$WS/documents/$DOC",
								},
							],
						},
					},
					"/v1/me": {
						get: {
							tags: ["Account"],
							operationId: "me",
							summary: "Who am I",
							description:
								"Introspect the API key in the `Authorization` header. Used by `tot login --key`.",
							security: [{ apiKey: [] }],
							responses: {
								200: {
									description: "OK.",
									content: {
										"application/json": {
											schema: { $ref: "#/components/schemas/Me" },
										},
									},
								},
								401: { description: "Missing or invalid key." },
							},
							"x-codeSamples": [
								{
									lang: "curl",
									source: "curl https://workspaces.plannotator.ai/v1/me -H 'authorization: Bearer wsk_live_…'",
								},
							],
						},
					},
				},
				components: {
					securitySchemes: {
						apiKey: {
							type: "http",
							scheme: "bearer",
							bearerFormat: "wsk_live_*",
							description:
								"An API key, sent as `Authorization: Bearer wsk_live_…`. Optional — anonymous publishing works without it.",
						},
					},
					schemas: {
						PublishRequest: {
							type: "object",
							required: ["kind", "body"],
							additionalProperties: false,
							properties: {
								kind: {
									type: "string",
									enum: ["markdown", "html"],
									description:
										"Markdown is served raw as text/markdown; HTML is served raw as text/html.",
								},
								body: {
									type: "string",
									description: "The file contents. Max 1.5 MB (UTF-8).",
								},
								title: { type: "string", nullable: true },
							},
						},
						AddDocumentRequest: {
							type: "object",
							required: ["doc_path", "kind", "body"],
							additionalProperties: false,
							properties: {
								doc_path: { type: "string", example: "index.html" },
								kind: { type: "string", enum: ["markdown", "html"] },
								body: {
									type: "string",
									description: "The file contents. Max 1.5 MB (UTF-8).",
								},
								title: { type: "string", nullable: true },
							},
						},
						PublishResponse: {
							type: "object",
							properties: {
								document: { $ref: "#/components/schemas/Document" },
								workspace: { $ref: "#/components/schemas/WorkspaceRef" },
							},
						},
						CreateWorkspaceResponse: {
							type: "object",
							properties: {
								workspace: { $ref: "#/components/schemas/WorkspaceRef" },
							},
						},
						Asset: {
							type: "object",
							properties: {
								path: { type: "string", example: "assets/logo.webp" },
								url: {
									type: "string",
									example: "https://tot.page/aB3xK9…/assets/logo.webp@<hash>",
								},
								content_type: { type: "string", example: "image/webp" },
								size: { type: "integer", example: 48213 },
								content_hash: {
									type: "string",
									example:
										"9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08",
								},
								created_at: { type: "string", format: "date-time" },
								updated_at: { type: "string", format: "date-time" },
							},
						},
						Document: {
							type: "object",
							properties: {
								id: { type: "string", example: "doc_01K…" },
								workspace_id: { type: "string", example: "ws_01K…" },
								doc_path: { type: "string", example: "index.md" },
								kind: { type: "string", enum: ["markdown", "html"] },
								title: { type: "string", nullable: true },
								version: {
									type: "string",
									nullable: true,
									description:
										"The content hash of the live version. `null` until the first checkpoint.",
								},
								share_url: {
									type: "string",
									description: "The living public link.",
									example: "https://tot.page/aB3xK9…",
								},
								file_url: {
									type: "string",
									nullable: true,
									description: "The frozen, version-pinned raw file URL.",
									example: "https://tot.page/aB3xK9…/index.md@<hash>",
								},
								body: { type: "string", description: "Present on reads." },
								created_at: { type: "string", format: "date-time" },
								updated_at: { type: "string", format: "date-time" },
							},
						},
						WorkspaceRef: {
							type: "object",
							properties: {
								id: { type: "string" },
								slug: { type: "string" },
								share_url: { type: "string", example: "https://tot.page/aB3xK9…" },
								visibility: {
									type: "string",
									enum: ["open", "public", "private", "org_gated"],
								},
							},
						},
						Me: {
							type: "object",
							properties: {
								user_id: { type: "string" },
								email: { type: "string", nullable: true },
								active_org_id: { type: "string", nullable: true },
							},
						},
						Error: {
							type: "object",
							properties: {
								error: {
									type: "object",
									properties: {
										code: { type: "string", example: "validation_error" },
										message: { type: "string" },
										details: { type: "object" },
									},
								},
							},
						},
					},
				},
			};
			Redoc.init(
				spec,
				{
					hideDownloadButton: false,
					expandResponses: "200,201",
					theme: {
						colors: { primary: { main: "#C2682E" } },
						typography: {
							fontFamily: "system-ui, -apple-system, sans-serif",
							code: { fontFamily: "'JetBrains Mono', monospace" },
							headings: { fontFamily: "ui-serif, Georgia, serif" },
						},
						sidebar: { backgroundColor: "#FAF9F5" },
					},
				},
				document.getElementById("redoc"),
			);
		</script>
	</body>
</html>
